<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>MIGRAZIONE SICUREZZA - CODEX V5.1</title>
    <link rel="stylesheet" href="assets/css/core.css">
    <style>
        body {
            background: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            padding: 40px;
        }

        .log-container {
            background: #111;
            border-radius: 12px;
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            border: 1px solid #333;
        }

        .success {
            color: #4ade80;
        }

        .error {
            color: #f87171;
        }

        .warning {
            color: #fbbf24;
        }

        .btn-start {
            background: #2563eb;
            color: white;
            padding: 15px 30px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .btn-start:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <h1>🛡️ Migrazione Sicurezza Aziendale (V6.0)</h1>
    <p>Questo tool eseguirà la scansione di tutti i dati "Azienda" e applicherà la crittografia AES-256-GCM ai campi
        sensibili salvati in chiaro.</p>

    <button id="btn-start" class="btn-start">AVVIA MIGRAZIONE</button>

    <div id="log" class="log-container">
        > In attesa di avvio...
    </div>

    <script type="module">
        import { auth, db } from './assets/js/firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-auth.js";
        import { collection, getDocs, doc, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/11.1.0/firebase-firestore.js";
        import { encrypt, ensureMasterKey } from './assets/js/modules/core/security-manager.js';

        let currentUser = null;
        const log = document.getElementById('log');
        const btn = document.getElementById('btn-start');

        const writeLog = (msg, type = '') => {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        };

        onAuthStateChanged(auth, user => {
            currentUser = user;
            if (user) {
                writeLog(`Utente loggato: ${user.email}`, 'success');
                btn.disabled = false;
            } else {
                writeLog("Errore: Devi essere loggato per procedere.", "error");
                btn.disabled = true;
            }
        });

        btn.onclick = async () => {
            btn.disabled = true;
            writeLog("Inizio migrazione...");

            let masterKey;
            try {
                masterKey = await ensureMasterKey();
                writeLog("MasterKey ottenuta correttamente.", "success");
            } catch (e) {
                writeLog("Errore: MasterKey obbligatoria per la migrazione.", "error");
                btn.disabled = false;
                return;
            }

            try {
                const uid = currentUser.uid;

                // 1. MIGRAZIONE AZIENDE
                writeLog("Scansione Aziende...");
                const aziendeSnap = await getDocs(collection(db, "users", uid, "aziende"));
                writeLog(`Trovate ${aziendeSnap.size} aziende.`, 'warning');

                for (const aziendaDoc of aziendeSnap.docs) {
                    const data = aziendaDoc.data();
                    const aziRef = doc(db, "users", uid, "aziende", aziendaDoc.id);

                    if (!data._encrypted) {
                        writeLog(`Criptazione anagrafica: ${data.ragioneSociale}...`);
                        const patch = {
                            _encrypted: true,
                            emails: { ...data.emails }
                        };

                        if (patch.emails.pec) patch.emails.pec.password = await encrypt(patch.emails.pec.password || '', masterKey);
                        if (patch.emails.amministrazione) patch.emails.amministrazione.password = await encrypt(patch.emails.amministrazione.password || '', masterKey);
                        if (patch.emails.personale) patch.emails.personale.password = await encrypt(patch.emails.personale.password || '', masterKey);

                        if (Array.isArray(patch.emails.extra)) {
                            patch.emails.extra = await Promise.all(patch.emails.extra.map(async e => ({
                                ...e,
                                password: await encrypt(e.password || '', masterKey)
                            })));
                        }

                        await updateDoc(aziRef, patch);
                        writeLog(`Azienda ${aziendaDoc.id} migrata.`, 'success');
                    }

                    // 2. MIGRAZIONE ACCOUNT AZIENDALI
                    const accountsSnap = await getDocs(collection(db, "users", uid, "aziende", aziendaDoc.id, "accounts"));
                    if (accountsSnap.size > 0) {
                        writeLog(`  > Trovati ${accountsSnap.size} account per questa azienda.`);
                        for (const accDoc of accountsSnap.docs) {
                            const accData = accDoc.data();
                            if (!accData._encrypted) {
                                const accRef = doc(db, "users", uid, "aziende", aziendaDoc.id, "accounts", accDoc.id);
                                const accPatch = {
                                    _encrypted: true,
                                    password: await encrypt(accData.password || '', masterKey),
                                    banking: await Promise.all((accData.banking || []).map(async b => ({
                                        ...b,
                                        passwordDispositiva: await encrypt(b.passwordDispositiva || '', masterKey),
                                        cards: await Promise.all((b.cards || []).map(async c => ({
                                            ...c,
                                            cardNumber: await encrypt(c.cardNumber || '', masterKey),
                                            pin: await encrypt(c.pin || '', masterKey),
                                            ccv: await encrypt(c.ccv || '', masterKey)
                                        })))
                                    })))
                                };
                                await updateDoc(accRef, accPatch);
                                writeLog(`    Account ${accDoc.id} criptato.`, 'success');
                            }
                        }
                    }
                }

                writeLog("✅ MIGRAZIONE COMPLETATA CON SUCCESSO.", "success");

            } catch (e) {
                console.error(e);
                writeLog(`ERRORE FATALE: ${e.message}`, "error");
            } finally {
                btn.disabled = false;
            }
        };
    </script>
</body>

</html>
